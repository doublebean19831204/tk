<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题库系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .progress {
            background: #e0e0e0;
            height: 6px;
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-bar {
            background: #667eea;
            height: 100%;
            transition: width 0.3s ease;
        }

        .question-section {
            margin-bottom: 30px;
        }

        .question-number {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option input[type="radio"] {
            margin-right: 12px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .option.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option.correct {
            border-color: #4caf50;
            background: #f1f8f4;
        }

        .option.incorrect {
            border-color: #f44336;
            background: #fef1f0;
        }

        .option-label {
            cursor: pointer;
            flex: 1;
            user-select: none;
        }

        .result-section {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
        }

        .result-section.show {
            display: block;
        }

        .result-section.correct {
            background: #f1f8f4;
            border-left: 4px solid #4caf50;
        }

        .result-section.incorrect {
            background: #fef1f0;
            border-left: 4px solid #f44336;
        }

        .result-title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result-section.correct .result-title {
            color: #4caf50;
        }

        .result-section.incorrect .result-title {
            color: #f44336;
        }

        .result-text {
            color: #333;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-submit {
            background: #667eea;
            color: white;
            flex: 1;
            max-width: 200px;
        }

        .btn-submit:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-next {
            background: #764ba2;
            color: white;
            flex: 1;
            max-width: 200px;
        }

        .btn-next:hover {
            background: #6a3f8d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3);
        }

        .btn-restart {
            background: #667eea;
            color: white;
            flex: 1;
            max-width: 200px;
        }

        .btn-restart:hover {
            background: #5568d3;
        }

        .completion {
            text-align: center;
            display: none;
        }

        .completion.show {
            display: block;
        }

        .completion h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .score {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .score-text {
            color: #666;
            margin-bottom: 30px;
            font-size: 18px;
        }

        .category-selector {
            margin-bottom: 30px;
            text-align: center;
        }

        .category-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .category-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .category-btn.active {
            background: #667eea;
            color: white;
        }

        .category-btn:hover {
            background: #667eea;
            color: white;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            text-align: center;
        }

        .stat-item {
            flex: 1;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            margin: 15px 0 5px;
        }

        .toolbar input {
            width: 80px;
            padding: 8px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
        }

        .btn-small {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .btn-jump {
            background: #764ba2;
            color: white;
        }

        .btn-jump:hover {
            background: #6a3f8d;
        }

        .btn-reset {
            background: #fff;
            color: #f44336;
            border: 2px solid #f44336;
        }

        .btn-reset:hover {
            background: #f44336;
            color: white;
        }

        .btn-clearwrong {
            background: #fff;
            color: #ff9800;
            border: 2px solid #ff9800;
        }

        .btn-clearwrong:hover {
            background: #ff9800;
            color: white;
        }

        .category-btn.wrong-btn {
            border-color: #f44336;
            color: #f44336;
        }

        .category-btn.wrong-btn.active {
            background: #f44336;
            color: white;
        }

        .category-btn.wrong-btn:hover {
            background: #f44336;
            color: white;
        }

        .empty-tip {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 16px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 题库系统</h1>
            <div class="category-selector" id="categorySelector"></div>
            <div class="progress">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div style="color: #999; font-size: 14px; margin-top: 10px;" id="progressText"></div>
        </div>

        <div id="quizContent">
            <div class="toolbar">
                <span style="color:#999;font-size:14px;">跳转到第</span>
                <input type="number" id="jumpInput" min="1" placeholder="题号">
                <span style="color:#999;font-size:14px;">题</span>
                <button class="btn-small btn-jump" onclick="jumpToQuestion()">跳转</button>
                <button class="btn-small btn-reset" onclick="resetProgress()">重置进度</button>
                <button class="btn-small btn-clearwrong" id="clearWrongBtn" onclick="clearWrong()" style="display:none;">清空错题本</button>
            </div>
            <div class="question-section" id="questionSection">
                <div class="question-number" id="questionNumber"></div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
                <div class="result-section" id="resultSection">
                    <div class="result-title" id="resultTitle"></div>
                    <div class="result-text" id="resultText"></div>
                </div>
            </div>

            <div class="empty-tip" id="emptyTip" style="display:none;">
                🎉 错题本是空的！<br>做错的题目会自动收集到这里，方便你针对性复习。
            </div>

            <div class="buttons">
                <button class="btn-submit" id="submitBtn" onclick="submitAnswer()">确定</button>
                <button class="btn-next" id="nextBtn" onclick="nextQuestion()" style="display: none;">下一题</button>
                <button class="btn-small btn-clearwrong" id="masterBtn" onclick="masterCurrent()" style="display: none;">已掌握，移出错题本</button>
            </div>
        </div>

        <div class="completion" id="completionSection">
            <h2>🎉 完成了！</h2>
            <div class="score" id="finalScore"></div>
            <div class="score-text" id="scoreText"></div>
            <div class="stats" id="stats"></div>
            <button class="btn-restart" onclick="restart()">重新开始</button>
        </div>
    </div>

    <script src="questions-data.js"></script>
    <script>
        const WRONG_PREFIX = '错题·';
        const isWrong = (c) => c.startsWith(WRONG_PREFIX);
        const realCat = (c) => c.slice(WRONG_PREFIX.length);
        const LS_PROGRESS = 'quiz_progress_v1';
        const LS_WRONG = 'quiz_wrong_v1';
        const LS_LAST = 'quiz_last_category_v1';

        let quizData = {};
        let currentCategory = '';
        // activeList: 当前视图的题目指针数组 [{category, index, question}]
        let activeList = [];
        let currentQuestionIndex = 0;
        let answered = false;

        // 加载题库数据：优先使用内嵌的 questions-data.js（双击即可用），
        // 如果不存在再尝试从 questions.json 加载（需本地服务器）。
        async function loadQuizData() {
            if (window.QUIZ_DATA && Object.keys(window.QUIZ_DATA).length > 0) {
                quizData = window.QUIZ_DATA;
                init();
                return;
            }
            try {
                const response = await fetch('questions.json');
                quizData = await response.json();
                init();
            } catch (error) {
                console.error('加载题库失败:', error);
                alert('无法加载题库数据。请确保 questions-data.js 文件存在。');
            }
        }

        document.addEventListener('DOMContentLoaded', loadQuizData);

        // ===== 本地存储工具 =====
        function loadProgress() {
            try { return JSON.parse(localStorage.getItem(LS_PROGRESS)) || {}; }
            catch (e) { return {}; }
        }
        function saveProgressMap(map) {
            localStorage.setItem(LS_PROGRESS, JSON.stringify(map));
        }
        function loadWrong() {
            try { return JSON.parse(localStorage.getItem(LS_WRONG)) || {}; }
            catch (e) { return {}; }
        }
        function saveWrong(map) {
            localStorage.setItem(LS_WRONG, JSON.stringify(map));
        }

        // 把当前分类的进度（题号）存起来
        function persistCurrentIndex() {
            const map = loadProgress();
            map[currentCategory] = currentQuestionIndex;
            saveProgressMap(map);
            localStorage.setItem(LS_LAST, currentCategory);
        }

        // 记录/移除错题
        function addWrong(category, index) {
            if (isWrong(category)) return;
            const map = loadWrong();
            if (!map[category]) map[category] = [];
            if (!map[category].includes(index)) {
                map[category].push(index);
                saveWrong(map);
            }
        }
        function removeWrong(category, index) {
            const map = loadWrong();
            if (map[category]) {
                map[category] = map[category].filter(i => i !== index);
                if (map[category].length === 0) delete map[category];
                saveWrong(map);
            }
        }
        function wrongCountOf(cat) {
            const map = loadWrong();
            return (map[cat] || []).length;
        }
        function buildWrongList(cat) {
            const map = loadWrong();
            const list = [];
            (map[cat] || []).forEach(idx => {
                if (quizData[cat] && quizData[cat][idx]) {
                    list.push({ category: cat, index: idx, question: quizData[cat][idx] });
                }
            });
            return list;
        }

        // ===== 初始化 =====
        function init() {
            renderCategoryButtons();
            // 恢复上次所在分类
            const last = localStorage.getItem(LS_LAST);
            const first = Object.keys(quizData)[0];
            const target = (last && (quizData[last] || (isWrong(last) && quizData[realCat(last)]))) ? last : first;
            selectCategory(target, true);
        }

        function renderCategoryButtons() {
            const selector = document.getElementById('categorySelector');
            selector.innerHTML = '';
            Object.keys(quizData).forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'category-btn' + (category === currentCategory ? ' active' : '');
                btn.textContent = category;
                btn.onclick = () => selectCategory(category);
                selector.appendChild(btn);
            });
            // 每个分类对应一个独立错题本
            Object.keys(quizData).forEach(category => {
                const wid = WRONG_PREFIX + category;
                const wbtn = document.createElement('button');
                const wc = wrongCountOf(category);
                wbtn.className = 'category-btn wrong-btn' + (currentCategory === wid ? ' active' : '');
                wbtn.textContent = `${category}·错题(${wc})`;
                wbtn.onclick = () => selectCategory(wid);
                selector.appendChild(wbtn);
            });
        }

        // 构建当前分类的 activeList
        function buildActiveList(category) {
            if (isWrong(category)) {
                return buildWrongList(realCat(category));
            }
            return quizData[category].map((q, i) => ({ category, index: i, question: q }));
        }

        function selectCategory(category, restore) {
            // 先保存旧分类进度
            if (currentCategory && activeList.length >= 0) {
                persistCurrentIndex();
            }
            currentCategory = category;
            activeList = buildActiveList(category);

            // 恢复该分类的进度
            const map = loadProgress();
            let idx = (restore || map[category] !== undefined) ? (map[category] || 0) : 0;
            if (idx >= activeList.length) idx = 0;
            currentQuestionIndex = idx;
            answered = false;

            document.getElementById('quizContent').style.display = 'block';
            document.getElementById('completionSection').classList.remove('show');
            document.getElementById('clearWrongBtn').style.display =
                isWrong(category) ? 'inline-block' : 'none';

            renderCategoryButtons();
            renderQuestion();
        }

        function renderQuestion() {
            const emptyTip = document.getElementById('emptyTip');
            const qSection = document.getElementById('questionSection');
            const buttons = document.querySelector('.buttons');

            // 错题本为空
            if (activeList.length === 0) {
                qSection.style.display = 'none';
                buttons.style.display = 'none';
                emptyTip.style.display = 'block';
                document.getElementById('progressBar').style.width = '0%';
                document.getElementById('progressText').textContent = '';
                return;
            }
            qSection.style.display = 'block';
            buttons.style.display = 'flex';
            emptyTip.style.display = 'none';

            const pointer = activeList[currentQuestionIndex];
            const question = pointer.question;
            const isMultiple = Array.isArray(question.correct);

            let label = `第 ${currentQuestionIndex + 1} 题 / 共 ${activeList.length} 题`;
            if (isWrong(currentCategory)) {
                label = `错题复习 · ${label}`;
            }
            document.getElementById('questionNumber').textContent = label;
            document.getElementById('questionText').textContent = question.question;

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            question.options.forEach((option, index) => {
                const lbl = document.createElement('label');
                lbl.className = 'option';
                const inputType = isMultiple ? 'checkbox' : 'radio';
                lbl.innerHTML = `
                    <input type="${inputType}" name="answer" value="${index}">
                    <span class="option-label">${option}</span>
                `;
                lbl.onclick = () => {
                    if (isMultiple) {
                        const input = lbl.querySelector('input');
                        if (input) input.checked = !input.checked;
                        updateMultipleSelection();
                    } else {
                        selectOption(index);
                    }
                };
                container.appendChild(lbl);
            });

            document.getElementById('resultSection').classList.remove('show', 'correct', 'incorrect');
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('masterBtn').style.display = 'none';
            answered = false;

            persistCurrentIndex();
            updateProgress();
        }

        function updateMultipleSelection() {
            document.querySelectorAll('.option').forEach(opt => {
                if (opt.querySelector('input:checked')) {
                    opt.classList.add('selected');
                } else {
                    opt.classList.remove('selected');
                }
            });
        }

        function selectOption(index) {
            document.querySelectorAll('.option input[type="radio"]').forEach(radio => {
                radio.checked = false;
            });
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });
            document.querySelectorAll('.option input[type="radio"]')[index].checked = true;
            document.querySelectorAll('.option')[index].classList.add('selected');
        }

        function submitAnswer() {
            const pointer = activeList[currentQuestionIndex];
            const question = pointer.question;
            const isMultiple = Array.isArray(question.correct);

            const selectedElements = document.querySelectorAll('input[type="' + (isMultiple ? 'checkbox' : 'radio') + '"]:checked');
            if (selectedElements.length === 0) {
                alert('请选择答案');
                return;
            }

            const selectedIndices = Array.from(selectedElements).map(el => parseInt(el.value)).sort((a, b) => a - b);

            let isCorrect = false;
            if (isMultiple) {
                const correctIndices = question.correct.slice().sort((a, b) => a - b);
                isCorrect = JSON.stringify(selectedIndices) === JSON.stringify(correctIndices);
            } else {
                isCorrect = selectedIndices[0] === question.correct;
            }

            answered = true;

            // 记录错题：错题本可反复练习，答对不自动移除，仅手动「移出」或「清空」时删除
            if (!isCorrect) {
                addWrong(pointer.category, pointer.index);
                renderCategoryButtons();
            }

            if (isCorrect) {
                showResult(true, question.explanation);
                if (isMultiple) {
                    question.correct.forEach(idx => {
                        document.querySelectorAll('.option')[idx].classList.add('correct');
                    });
                } else {
                    document.querySelectorAll('.option')[question.correct].classList.add('correct');
                }
            } else {
                showResult(false, question.explanation);
                selectedIndices.forEach(idx => {
                    if (isMultiple && !question.correct.includes(idx)) {
                        document.querySelectorAll('.option')[idx].classList.add('incorrect');
                    } else if (!isMultiple) {
                        document.querySelectorAll('.option')[idx].classList.add('incorrect');
                    }
                });
                if (isMultiple) {
                    question.correct.forEach(idx => {
                        document.querySelectorAll('.option')[idx].classList.add('correct');
                    });
                } else {
                    document.querySelectorAll('.option')[question.correct].classList.add('correct');
                }
            }

            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
            // 错题本模式下，答完显示「已掌握，移出错题本」按钮
            document.getElementById('masterBtn').style.display =
                isWrong(currentCategory) ? 'block' : 'none';
        }

        function showResult(isCorrect, explanation) {
            const resultSection = document.getElementById('resultSection');
            const resultTitle = document.getElementById('resultTitle');
            const resultText = document.getElementById('resultText');
            resultSection.className = 'result-section show ' + (isCorrect ? 'correct' : 'incorrect');
            resultTitle.textContent = isCorrect ? '✓ 正确' : '✗ 错误';
            resultText.textContent = explanation || (isCorrect ? '回答正确！' : '请记住正确答案。');
        }

        function nextQuestion() {
            if (currentQuestionIndex < activeList.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                showCompletion();
            }
        }

        function showCompletion() {
            document.getElementById('quizContent').style.display = 'none';
            const completion = document.getElementById('completionSection');
            completion.classList.add('show');

            document.getElementById('finalScore').textContent =
                isWrong(currentCategory) ? `${realCat(currentCategory)}·错题` : `${currentCategory}`;
            document.getElementById('scoreText').textContent =
                isWrong(currentCategory)
                    ? `你已复习完该错题本（共 ${activeList.length} 题）`
                    : `你已完成「${currentCategory}」全部 ${activeList.length} 题`;

            // 统计：各分类进度 + 各分类错题数
            let statsHtml = '';
            const progress = loadProgress();
            Object.keys(quizData).forEach(cat => {
                const done = (progress[cat] || 0) + 1;
                const total = quizData[cat].length;
                statsHtml += `
                    <div class="stat-item">
                        <div>${cat}</div>
                        <div class="stat-number">${Math.min(done, total)}/${total}</div>
                        <div class="stat-label">已做到</div>
                    </div>
                `;
            });
            Object.keys(quizData).forEach(cat => {
                statsHtml += `
                    <div class="stat-item">
                        <div>${cat}·错题</div>
                        <div class="stat-number">${wrongCountOf(cat)}</div>
                        <div class="stat-label">待复习</div>
                    </div>
                `;
            });
            document.getElementById('stats').innerHTML = statsHtml;
        }

        // 完成页「重新开始」：回到当前分类第1题
        function restart() {
            resetProgress();
        }

        function updateProgress() {
            const percentage = ((currentQuestionIndex + 1) / activeList.length) * 100;
            document.getElementById('progressBar').style.width = percentage + '%';
            document.getElementById('progressText').textContent =
                `${currentQuestionIndex + 1} / ${activeList.length}`;
            document.getElementById('jumpInput').max = activeList.length;
        }

        // ===== 跳转 =====
        function jumpToQuestion() {
            if (activeList.length === 0) return;
            const input = document.getElementById('jumpInput');
            let n = parseInt(input.value, 10);
            if (isNaN(n)) { alert('请输入题号'); return; }
            if (n < 1) n = 1;
            if (n > activeList.length) n = activeList.length;
            currentQuestionIndex = n - 1;
            answered = false;
            document.getElementById('quizContent').style.display = 'block';
            document.getElementById('completionSection').classList.remove('show');
            renderQuestion();
            input.value = '';
        }

        // ===== 重置当前分类进度 =====
        function resetProgress() {
            currentQuestionIndex = 0;
            answered = false;
            const map = loadProgress();
            map[currentCategory] = 0;
            saveProgressMap(map);
            document.getElementById('quizContent').style.display = 'block';
            document.getElementById('completionSection').classList.remove('show');
            renderQuestion();
        }

        // ===== 已掌握，移出当前错题 =====
        function masterCurrent() {
            if (!isWrong(currentCategory) || activeList.length === 0) return;
            const pointer = activeList[currentQuestionIndex];
            removeWrong(pointer.category, pointer.index);
            activeList.splice(currentQuestionIndex, 1);
            if (currentQuestionIndex >= activeList.length) {
                currentQuestionIndex = Math.max(0, activeList.length - 1);
            }
            renderCategoryButtons();
            renderQuestion();
        }

        // ===== 清空当前分类的错题本 =====
        function clearWrong() {
            if (!isWrong(currentCategory)) return;
            const cat = realCat(currentCategory);
            if (!confirm(`确定要清空「${cat}」的错题本吗？`)) return;
            const map = loadWrong();
            delete map[cat];
            saveWrong(map);
            activeList = buildActiveList(currentCategory);
            currentQuestionIndex = 0;
            renderCategoryButtons();
            renderQuestion();
        }
    </script>
</body>
</html>
